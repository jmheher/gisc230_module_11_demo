<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module 10 Demo 3 - PWA Mapping</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#155e75" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Demo 3: PWA-Enhanced Mapping</h1>
      <p>Responsive layout, click-based coordination, geolocation, and baseline PWA support.</p>
    </div>
    <button id="locateBtn" class="primary-btn">Locate Me</button>
  </header>

  <main class="layout">
    <section class="panel map-panel">
      <div class="panel-top">
        <h2>Map</h2>
        <button id="toggleLegend" class="secondary-btn">Toggle Legend</button>
      </div>
      <div id="map"></div>
      <div id="legend" class="legend">
        <h3>Service Value</h3>
        <p>Tap a region to synchronize the map and chart.</p>
        <ul>
          <li><span class="swatch high"></span> High</li>
          <li><span class="swatch medium"></span> Medium</li>
          <li><span class="swatch low"></span> Low</li>
        </ul>
      </div>
      <p id="status" class="status">Status: Waiting for map interaction.</p>
    </section>

    <section class="panel chart-panel">
      <h2>Chart</h2>
      <svg id="chart" viewBox="0 0 560 320" preserveAspectRatio="xMidYMid meet"></svg>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/main.js"></script>
</body>
</html>
